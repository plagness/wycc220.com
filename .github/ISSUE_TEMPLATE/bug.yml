name: Ошибка
description: Сообщить о воспроизводимой проблеме без чувствительных данных
title: "[Ошибка]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Не публикуйте секреты, персональные данные и уязвимости. Для уязвимостей используйте Security Advisory."
  - type: textarea
    id: description
    attributes:
      label: Что произошло?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Как воспроизвести?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Браузер и устройство
