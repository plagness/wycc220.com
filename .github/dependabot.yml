version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      safe-minor-and-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    target-branch: dev
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: dev
